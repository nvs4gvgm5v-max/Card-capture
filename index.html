<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Захват карты банкоматом</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f4f6f8; --card: #ffffff; --text: #1f2937; --muted: #667085;
      --line: #e5e7eb; --blue: #2563eb; --blue-soft: #eff6ff;
      --green: #16a34a; --green-soft: #dcfce7; --red: #dc2626; --red-soft: #fee2e2;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
    }
    body {
      margin: 0; min-height: 100vh; padding: 16px; font-family: Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #eef4ff 0, var(--bg) 38%, #f8fafc 100%);
    }
    .app { width: 100%; max-width: 940px; margin: 0 auto; }
    .panel {
      background: var(--card); border-radius: 24px; box-shadow: var(--shadow);
      padding: 26px; border: 1px solid rgba(229, 231, 235, 0.9);
    }
    h1, h2 { margin: 0; line-height: 1.2; }
    h1 { font-size: 30px; }
    .subtitle { margin-top: 8px; color: var(--muted); line-height: 1.45; font-size: 15px; }
    .topline { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
    .badge {
      background: var(--blue-soft); color: var(--blue); border: 1px solid #bfdbfe;
      border-radius: 999px; padding: 8px 12px; font-weight: 700; font-size: 13px; white-space: nowrap;
    }
    .progress-wrap { margin: 18px 0 20px; }
    .progress-text { display: flex; justify-content: space-between; gap: 12px; font-weight: 700; margin-bottom: 8px; }
    .progressbar { height: 10px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .progressbar > div { height: 100%; width: 0%; background: var(--blue); border-radius: 999px; transition: width 0.25s ease; }
    .chat {
      background: #f8fafc; border: 1px solid var(--line); border-radius: 20px;
      padding: 16px; max-height: 52vh; overflow: auto; margin-bottom: 18px; scroll-behavior: smooth;
    }
    .msg { display: flex; margin: 10px 0; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .msg.operator { justify-content: flex-end; }
    .bubble {
      max-width: 84%; padding: 13px 15px; border-radius: 18px;
      line-height: 1.45; font-size: 16px; white-space: pre-wrap;
    }
    .client .bubble { background: #fff; border: 1px solid var(--line); border-top-left-radius: 6px; }
    .operator .bubble { background: #dbeafe; border: 1px solid #bfdbfe; border-top-right-radius: 6px; }
    .speaker {
      display: block; font-size: 12px; font-weight: 700; color: var(--muted);
      margin-bottom: 4px; text-transform: uppercase; letter-spacing: .03em;
    }
    .answers-title {
      font-size: 13px; text-transform: uppercase; color: var(--muted);
      font-weight: 700; margin: 0 0 10px; letter-spacing: .04em;
    }
    .answers { display: grid; gap: 12px; }
    .answer {
      width: 100%; border: 2px solid #d0d5dd; background: #fff; border-radius: 16px;
      padding: 15px 17px; font-size: 16px; line-height: 1.42; text-align: left; cursor: pointer;
      transition: 0.18s ease;
    }
    .answer:hover { border-color: #93c5fd; background: #f8fbff; transform: translateY(-1px); }
    .answer.correct { background: var(--green-soft); border-color: var(--green); }
    .answer.wrong { background: var(--red-soft); border-color: var(--red); }
    .answer:disabled { cursor: default; }
    .message { margin-top: 14px; min-height: 24px; color: var(--red); font-weight: 700; }
    .finish { text-align: center; padding: 28px 10px 8px; }
    .finish h2 { font-size: 30px; margin-bottom: 10px; }
    .primary {
      margin-top: 22px; border-radius: 999px; padding: 12px 18px; font-size: 15px;
      cursor: pointer; border: 1px solid var(--blue); background: var(--blue); color: white;
    }
    @media (max-width: 720px) {
      body { padding: 10px; } .panel { padding: 18px; border-radius: 18px; }
      .topline { display: block; } .badge { display: inline-block; margin-top: 12px; }
      h1 { font-size: 25px; } .bubble { max-width: 94%; font-size: 15px; }
      .answer { font-size: 15px; padding: 14px; } .chat { max-height: 48vh; }
    }
  </style>
</head>
<body>
  <main class="app"><section class="panel" id="root"></section></main>

  <script>
    const scenario = {
      title: "Захват карты банкоматом",
      desc: "Кейс: карта ПСБ, банкомат УБРиР, Ярославль.",
      intro: [{ role: "operator", text: "Добрый день, меня зовут Виктория, чем могу вам помочь?" }],
      steps: [
        { client: "Здравствуйте, банкомат съел мою карту. Что делать?", answers: [
          { text: "Для того, чтобы ответить на данный вопрос, мне необходимо провести процедуру проверки данных. Уточните, ваши ФИО и дату рождения.", correct: false },
          { text: "Как я могу к вам обращаться?", correct: true }
        ]},
        { client: "Ирина", answers: [
          { text: "Ирина, буду рада вам помочь. Кодовое слово задавали в нашем банке?", correct: false },
          { text: "Ирина, буду рада вам помочь. Подскажите, номер банкомата, который захватил карту. Его можно узнать, распечатав чек или посмотрев на экране банкомата в правом нижнем углу.", correct: false },
          { text: "Ирина, буду рада вам помочь. Подскажите, карта какого банка была захвачена?", correct: true }
        ]},
        { client: "ПСБ", answers: [
          { text: "Подскажите серийный номер банкомата. Его можно узнать, распечатав чек или посмотрев на экране банкомата в правом нижнем углу.", correct: false },
          { text: "В банкомате какого банка?", correct: true },
          { text: "В каком офисе произошел захват карты?", correct: false }
        ]},
        { client: "УБРиР", answers: [
          { text: "В каком регионе находитесь сейчас?", correct: true },
          { text: "Подскажите серийный номер банкомата. Его можно узнать, распечатав чек или посмотрев на экране банкомата в правом нижнем углу.", correct: false },
          { text: "В таком случае рекомендую перевыпустить карту.", correct: false }
        ]},
        { client: "Ярославль, Ярославская область", answers: [
          { text: "В таком случае рекомендую карту заблокировать. После блокировки карты средствами невозможно будет воспользоваться, так что рекомендую средства перевести с карты, либо в офис после блокировки обратитесь, чтоб средства вывести. Будет возможность в личном кабинете блокировку осуществить?", correct: true },
          { text: "В таком случае рекомендую обратиться в свой банк и заблокировать карту, а также уточнить причину изъятия. Предположительный срок изъятия из банкомата и доставки карты в уполномоченное подразделение Банка составляет до 10 рабочих дней.", correct: false },
          { text: "В таком случае рекомендую перевыпустить карту. Предположительный срок изъятия из банкомата и доставки карты в уполномоченное подразделение Банка составляет до 10 рабочих дней.", correct: false }
        ]},
        { client: "Да. Карту когда вернут?", answers: [
          { text: "Необходимо направить карту на перевыпуск, так как сторонние банкоматы не осуществляют возврат карты.", correct: true },
          { text: "Предположительный срок изъятия из банкомата и доставки карты в уполномоченное подразделение Банка составляет от 10 рабочих дней. Данный срок является ориентировочным и может быть увеличен.", correct: false }
        ]},
        { client: "Понятно", answers: [
          { text: "Спасибо за обращение, хорошего дня.", correct: false },
          { text: "У вас остались еще ко мне вопросы?", correct: true }
        ]},
        { client: "Нет", answers: [
          { text: "Спасибо за обращение, хорошего дня.", correct: true }
        ]}
      ]
    };

    const root = document.getElementById("root");
    let currentStep = 0;
    let history = [];
    let locked = false;

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function startTrainer() {
      currentStep = 0;
      history = [...scenario.intro];
      locked = false;
      renderStep();
    }

    function renderStep() {
      locked = false;
      const step = scenario.steps[currentStep];
      const percent = Math.round((currentStep / scenario.steps.length) * 100);
      const chatItems = [...history, { role: "client", text: step.client }];

      root.innerHTML = `
        <div class="topline">
          <div>
            <h1>${escapeHtml(scenario.title)}</h1>
            <div class="subtitle">${escapeHtml(scenario.desc)}</div>
          </div>
          <div class="badge">Один кейс</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-text">
            <span>Шаг ${currentStep + 1} из ${scenario.steps.length}</span>
            <span>${percent}%</span>
          </div>
          <div class="progressbar"><div style="width:${percent}%"></div></div>
        </div>
        <div class="chat" id="chat">
          ${chatItems.map(msg => `
            <div class="msg ${msg.role}">
              <div class="bubble">
                <span class="speaker">${msg.role === "operator" ? "Оператор" : "Клиент"}</span>
                ${escapeHtml(msg.text)}
              </div>
            </div>
          `).join("")}
        </div>
        <div class="answers-title">Выберите ответ оператора</div>
        <div class="answers">
          ${step.answers.map((answer, index) => `
            <button class="answer" onclick="checkAnswer(${index})">${escapeHtml(answer.text)}</button>
          `).join("")}
        </div>
        <div class="message" id="message"></div>
      `;

      const chat = document.getElementById("chat");
      chat.scrollTop = chat.scrollHeight;
    }

    function checkAnswer(answerIndex) {
      if (locked) return;
      locked = true;

      const step = scenario.steps[currentStep];
      const selected = step.answers[answerIndex];
      const buttons = document.querySelectorAll(".answer");
      const message = document.getElementById("message");

      buttons.forEach(btn => btn.disabled = true);

      if (selected.correct) {
        buttons[answerIndex].classList.add("correct");

        setTimeout(() => {
          history.push({ role: "client", text: step.client });
          history.push({ role: "operator", text: selected.text });
          currentStep++;

          if (currentStep >= scenario.steps.length) showFinish();
          else renderStep();
        }, 700);
      } else {
        buttons[answerIndex].classList.add("wrong");
        message.textContent = "Ответ неверный. Начинаем сначала.";

        setTimeout(() => {
          startTrainer();
        }, 1500);
      }
    }

    function showFinish() {
      root.innerHTML = `
        <div class="finish">
          <h2>Поздравляем! Кейс успешно пройден.</h2>
          <p class="subtitle">Диалог завершен без ошибок.</p>
          <button class="primary" onclick="startTrainer()">Пройти ещё раз</button>
        </div>
      `;
    }

    startTrainer();
  </script>
</body>
</html>
