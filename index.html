let ci=0,si=0,lock=false;const app=document.getElementById("app");
function esc(s){return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function menu(){lock=false;app.innerHTML=`<div class="grid">${cases.map((x,n)=>`<button class="case" onclick="start(${n})"><b>${esc(x.t)}</b></button>`).join("")}</div>`}
function start(n){ci=n;si=0;render()}
function render(){lock=false;let cs=cases[ci],st=cs.s[si],p=Math.round(si/cs.s.length*100);app.innerHTML=`<div class="top"><div><b>${esc(cs.t)}</b></div><button class="btn back" onclick="menu()">← К меню</button></div><div class="progress-text"><span>Шаг ${si+1} из ${cs.s.length}</span><span>${p}%</span></div><div class="bar"><div class="fill" style="width:${p}%"></div></div><div class="card"><div class="label">Клиент</div><div class="client">${esc(st.c)}</div></div><div class="label">Варианты ответа оператора</div><div class="answers">${st.a.map((x,n)=>`<button class="btn" onclick="ans(${n})">${esc(x[0])}</button>`).join("")}</div><div class="msg" id="msg"></div>`}
function ans(n){if(lock)return;lock=true;let st=cases[ci].s[si],b=document.querySelectorAll(".btn"),ok=st.a[n][1],m=document.getElementById("msg");b.forEach(x=>x.disabled=true);if(ok){b[n].classList.add("ok");setTimeout(()=>{si++;si>=cases[ci].s.length?finish():render()},650)}else{b[n].classList.add("bad");m.textContent="Ответ неверный. Начинаем сначала.";setTimeout(()=>{si=0;render()},1500)}}
function finish(){app.innerHTML=`<div class="bar"><div class="fill" style="width:100%"></div></div><div class="finish"><h2>🎉 Поздравляем! Вы успешно прошли тренажер!</h2><div class="actions"><button class="btn smallbtn" onclick="menu()">Вернуться к списку кейсов</button><button class="btn smallbtn ghost" onclick="start(ci)">Пройти кейс еще раз</button></div></div>`}
menu();
